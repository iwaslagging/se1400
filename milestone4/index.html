<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>NightQuest | Milestone 4 Grid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-grid">

    <header class="header box">
      Header / Navigation
    </header>

    <section class="hero box">
      Hero Section
    </section>

    <section class="categories section-box">
      <h2>Categories Section</h2>
      <div class="categories-grid">
        <div class="cat1 box">Events Card</div>
        <div class="cat2 box">Cheap Eats Card</div>
        <div class="cat3 box">Date Ideas Card</div>
        <div class="cat4 box">Hangout Spots Card</div>
      </div>
    </section>

    <section class="picks section-box">
      <h2>This Weekend's Top Picks</h2>
      <div class="picks-grid">
        <div class="pick1 box">Event Card 1</div>
        <div class="pick2 box">Event Card 2</div>
        <div class="pick3 box">Event Card 3</div>
        <div class="pick4 box">Event Card 4</div>
        <div class="pick5 box">Event Card 5</div>
        <div class="pick6 box">Event Card 6</div>
      </div>
    </section>

    <section class="spots section-box">
      <h2>Popular Student Spots</h2>
      <div class="spots-grid">
        <div class="spot1 box">Student Spot 1</div>
        <div class="spot2 box">Student Spot 2</div>
      </div>
    </section>

    <section class="cta box">
      CTA Banner
    </section>

    <footer class="footer box">
      Footer
    </footer>

  </div>
</body>
</html>
