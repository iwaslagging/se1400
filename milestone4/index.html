<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NightQuest | Grid Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-grid">

    <!-- HEADER -->
    <header class="header">Header / Navigation</header>

    <!-- HERO -->
    <section class="hero">Hero Banner</section>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <section class="categories">Categories Section</section>

      <section class="top-picks">Top Picks / Event Cards Section</section>

      <section class="student-spots">Student Spots Section</section>

    </main>

    <!-- CTA -->
    <section class="cta">Call To Action Banner</section>

    <!-- FOOTER -->
    <footer class="footer">Footer</footer>

  </div>
</body>
</html>
